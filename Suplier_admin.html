<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier - STOK.KU</title>
  <meta name="description" content="Halaman manajemen data supplier - STOK.KU Inventaris">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fff;
      --surface-strong: #0a1428; /* Very dark blue for button and wrapper */
      --text: #111827;
      --muted: #64748b;
      --border: #0a1428; /* Dark borders for table */
      --border-light: #cbd5e1;
      --accent: #0a1428;
      --danger: #dc2626;
      --radius: 8px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }

    /* Topbar */
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: var(--surface); border-bottom: 1px solid var(--border-light); }
    .menu-icon { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
    .menu-icon span { display: block; width: 24px; height: 2px; background: var(--accent); }
    .profile-section { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .profile-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); display: grid; place-items: center; }
    .profile-avatar svg { width: 18px; height: 18px; fill: var(--accent); }
    .profile-name { font-weight: 500; font-size: 14px; color: var(--accent); display: flex; align-items: center; gap: 8px; }

    /* Sidebar */
    .sidebar-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.4);opacity:0;visibility:hidden;transition:0.3s;z-index:998}
    .sidebar-overlay.show{opacity:1;visibility:visible}
    .sidebar{position:fixed;top:0;left:0;height:100vh;width:260px;background:#051428;box-shadow:4px 0 24px rgba(0,0,0,0.2);transform:translateX(-100%);transition:0.3s;z-index:999;display:flex;flex-direction:column;color:#fff}
    .sidebar.show{transform:translateX(0)}
    .sidebar-header{background:#4b5a75;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
    .sidebar-header h2{margin:0;font-size:20px;color:#fff;letter-spacing:1px;text-align:center;flex:1}
    .close-btn{background:none;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;padding:0}
    .sidebar-nav{padding:16px 0;display:flex;flex-direction:column;flex:1;overflow-y:auto}
    .nav-link{padding:12px 32px;text-decoration:none;color:#e2e8f0;font-size:14px;font-weight:600;transition:0.2s;display:flex;align-items:center;gap:12px}
    .nav-link:hover{background:rgba(255,255,255,0.08);color:#fff}
    .nav-link.active{background:rgba(255,255,255,0.15);color:#fff;border-left:3px solid transparent}
    .sidebar-divider{height:1px;background:rgba(255,255,255,0.15);border:none;margin:12px 24px}
    .sidebar-footer{padding:0 0 24px 0}
    .logout-link{justify-content:center;margin-top:12px}

    /* Page Content */
    .page { padding: 26px 32px; max-width: 1200px; margin: 0 auto; }
    .page-title { font-size: 24px; font-weight: 700; margin: 0 0 24px 0; color: #000; }

    /* Search Bar */
    .search-container { display: flex; gap: 16px; margin-bottom: 24px; }
    .search-input { flex: 1; padding: 12px 16px; border: 1px solid var(--accent); border-radius: 4px; font-size: 14px; outline: none; font-family: inherit; font-weight: 600; }
    .search-input::placeholder { color: #9ca3af; font-weight: 600; }
    .btn-search { background: var(--surface-strong); color: #fff; border: 1px solid var(--surface-strong); padding: 12px 40px; border-radius: 4px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; width: 280px;}
    .btn-search:hover { opacity: 0.9; }

    /* Table */
    .table-container { background: var(--surface); margin-bottom: 24px; overflow-x: auto; border-radius: 4px; }
    .table-bordered { width: 100%; border-collapse: collapse; text-align: center; border: 1px solid var(--border); }
    .table-bordered th, .table-bordered td { border: 1px solid var(--border); padding: 16px 12px; font-size: 14px; color: #000; }
    .table-bordered th { font-weight: 700; background: #fff; }
    .table-bordered td { font-weight: 500; }
    .table-bordered tbody tr { background: #fff; }

    /* Action Buttons */
    .action-buttons { display: flex; gap: 8px; justify-content: center; align-items: center; }
    .btn-icon { background: #fff; border: 1.5px solid var(--accent); border-radius: 4px; width: 32px; height: 32px; display: grid; place-items: center; cursor: pointer; color: var(--accent); transition: background 0.2s; }
    .btn-icon:hover { background: #f3f4f6; }
    .btn-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Form Container (Dark Background) */
    .form-wrapper { background: var(--surface-strong); border-radius: var(--radius); padding: 32px; display: flex; justify-content: center; align-items: center; margin-top: 16px; }
    .form-card { background: var(--surface); border-radius: 8px; padding: 24px 32px; width: 100%; max-width: 860px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .form-title { font-size: 18px; font-weight: 700; margin: 0 0 20px 0; color: #000; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 13px; font-weight: 700; color: #000; }
    .form-input { padding: 12px 16px; border: 1.5px solid var(--accent); border-radius: 4px; font-size: 13px; font-weight: 600; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .form-input:focus { border-color: #3b6ea8; }
    .form-input::placeholder { color: #9ca3af; font-weight: 600; }

    .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel { background: #fff; border: 1.5px solid var(--accent); color: var(--accent); padding: 10px 40px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .btn-cancel:hover { background: #f1f5f9; }
    .btn-save { background: var(--surface-strong); border: 1.5px solid var(--surface-strong); color: #fff; padding: 10px 40px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 768px) {
      .search-container { flex-direction: column; }
      .btn-search { width: 100%; }
      .form-row { grid-template-columns: 1fr; }
      .table-container { overflow-x: auto; }
      .page { padding: 16px; }
      .form-wrapper { padding: 16px; border-radius: 0; }
    }
  </style>
</head>
<body>

  <!-- Sidebar Overlay & Menu -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="close-btn" id="closeSidebar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
      </button>
      <h2>STOK.KU</h2>
      <div style="width:20px"></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard_admin.html" class="nav-link">Dashboard</a>
      <a href="databarang_admin.html" class="nav-link">Data Barang</a>
      <a href="laporan_stok_admin.html" class="nav-link">Laporan Stok</a>
      <a href="laporan_barang_masuk_admin.html" class="nav-link">Laporan Barang Masuk</a>
      <a href="laporan_bk_admin.html" class="nav-link">Laporan Barang Keluar</a>
      <a href="mutasi_barang_admin.html" class="nav-link">Mutasi Barang</a>
      <hr class="sidebar-divider">
      <a href="kategori_brg_admin.html" class="nav-link">Kategori</a>
      <a href="satuan_admin.html" class="nav-link">Satuan</a>
      <a href="Suplier_admin.html" class="nav-link active">Supplier</a>
      <hr class="sidebar-divider">
      <a href="user_admin.html" class="nav-link">User &amp; Role</a>
    </nav>
    <div class="sidebar-footer">
      <hr class="sidebar-divider">
      <a href="#" class="nav-link logout-link" onclick="logout()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Keluar
      </a>
    </div>
  </div>

  <!-- Topbar -->
  <div class="topbar">
    <div class="menu-icon" id="menuToggle">
      <span></span><span></span><span></span>
    </div>
    <div class="profile-section">
      <div class="profile-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="profile-name">
        Admin
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
    </div>
  </div>

  <div class="page">
    <h1 class="page-title">Supplier</h1>

    <!-- Search Section -->
    <div class="search-container">
      <input type="text" class="search-input" id="searchKeyword" placeholder="Cari Supplier">
      <button class="btn-search" id="btnSearch">Tampilkan</button>
    </div>

    <!-- Table Section -->
    <div class="table-container">
      <table class="table-bordered">
        <thead>
          <tr>
            <th style="width: 70px;">NO</th>
            <th>Nama Supplier</th>
            <th>Alamat</th>
            <th>NO HP</th>
            <th>Email</th>
            <th style="width: 120px;">Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6" style="text-align: center; color: var(--muted); padding: 32px 0;">Memuat data supplier...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Form Section -->
    <div class="form-wrapper">
      <div class="form-card" id="formCard">
        <h3 class="form-title" id="formTitle">Tambah Supplier</h3>
        <input type="hidden" id="formId">
        <div class="form-row">
          <div class="form-group">
            <label for="formNama">Nama Supplier</label>
            <input type="text" class="form-input" id="formNama" placeholder="Masukan Nama Supplier">
          </div>
          <div class="form-group">
            <label for="formAlamat">Alamat</label>
            <input type="text" class="form-input" id="formAlamat" placeholder="Masukan Alamat">
          </div>
          <div class="form-group">
            <label for="formNoHp">NO HP</label>
            <input type="text" class="form-input" id="formNoHp" placeholder="Masukan NO HP">
          </div>
          <div class="form-group">
            <label for="formEmail">Email</label>
            <input type="email" class="form-input" id="formEmail" placeholder="Masukan Email">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" id="btnCancel">Batal</button>
          <button class="btn-save" id="btnSave">Simpan</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Sidebar Logic
    const menuBtn = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const closeBtn = document.getElementById('closeSidebar');

    if (menuBtn) menuBtn.addEventListener('click', () => { sidebar.classList.add('show'); overlay.classList.add('show'); });
    const closeMenu = () => { sidebar.classList.remove('show'); overlay.classList.remove('show'); };
    if (closeBtn) closeBtn.addEventListener('click', closeMenu);
    if (overlay) overlay.addEventListener('click', closeMenu);

    function logout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('auth_token');
      window.location.href = 'login.html';
    }

    // API
    const API_BASE_URL = 'http://192.168.88.74/inventaris-barang-BE/public/api';
    const token = localStorage.getItem('access_token') || localStorage.getItem('auth_token');
    if (!token) window.location.href = 'login.html';

    const headers = {
      'Accept': 'application/json',
      'Authorization': `Bearer ${token}`
    };

    const tableBody = document.getElementById('tableBody');
    const searchKeyword = document.getElementById('searchKeyword');
    const formTitle = document.getElementById('formTitle');
    const formId = document.getElementById('formId');
    const formNama = document.getElementById('formNama');
    const formAlamat = document.getElementById('formAlamat');
    const formNoHp = document.getElementById('formNoHp');
    const formEmail = document.getElementById('formEmail');
    const btnSave = document.getElementById('btnSave');
    const btnCancel = document.getElementById('btnCancel');
    const formCard = document.getElementById('formCard');

    let isEditing = false;

    async function fetchSuppliers() {
      tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--muted); padding: 32px 0;">Memuat data supplier...</td></tr>';

      let url = `${API_BASE_URL}/suppliers`;
      if (searchKeyword.value) {
        url += `?search=${encodeURIComponent(searchKeyword.value)}`;
      }

      try {
        const res = await fetch(url, { headers });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        if (res.ok) {
          renderTable(data.data);
        } else {
          tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--danger); padding: 32px 0;">Gagal memuat: ${data.message}</td></tr>`;
        }
      } catch (err) {
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--danger); padding: 32px 0;">Terjadi kesalahan jaringan</td></tr>';
      }
    }

    function renderTable(data) {
      tableBody.innerHTML = '';
      if (!data || data.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--muted); padding: 32px 0;">Tidak ada data supplier</td></tr>';
        return;
      }

      data.forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${item.nama_supplier || item.name || '-'}</td>
          <td>${item.alamat || '-'}</td>
          <td>${item.no_hp || item.phone || '-'}</td>
          <td>${item.email || '-'}</td>
          <td>
            <div class="action-buttons">
              <button class="btn-icon" title="Edit" onclick='editSupplier(${JSON.stringify(item)})'>
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              </button>
              <button class="btn-icon" title="Hapus" onclick="deleteSupplier(${item.id})">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </div>
          </td>
        `;
        tableBody.appendChild(tr);
      });

      // Empty row like mockup
      const emptyRow = document.createElement('tr');
      emptyRow.innerHTML = '<td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td>';
      tableBody.appendChild(emptyRow);
    }

    async function saveSupplier() {
      if (!formNama.value || !formAlamat.value) {
        alert('Harap isi nama dan alamat supplier!');
        return;
      }

      const payload = {
        nama_supplier: formNama.value,
        alamat: formAlamat.value,
        no_hp: formNoHp.value || '',
        email: formEmail.value || ''
      };

      const url = isEditing ? `${API_BASE_URL}/suppliers/${formId.value}` : `${API_BASE_URL}/suppliers`;
      const method = isEditing ? 'PUT' : 'POST';

      btnSave.textContent = 'Menyimpan...';
      btnSave.disabled = true;

      try {
        const res = await fetch(url, {
          method,
          headers: { ...headers, 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          resetForm();
          fetchSuppliers();
          alert(isEditing ? 'Supplier berhasil diperbarui!' : 'Supplier berhasil ditambahkan!');
        } else {
          const data = await res.json();
          alert('Gagal: ' + (data.message || 'Terjadi kesalahan'));
        }
      } catch (err) {
        alert('Kesalahan jaringan');
      } finally {
        btnSave.textContent = 'Simpan';
        btnSave.disabled = false;
      }
    }

    function editSupplier(item) {
      isEditing = true;
      formTitle.textContent = 'Edit Supplier';
      formId.value = item.id;
      formNama.value = item.nama_supplier || item.name || '';
      formAlamat.value = item.alamat || '';
      formNoHp.value = item.no_hp || item.phone || '';
      formEmail.value = item.email || '';
      formCard.scrollIntoView({ behavior: 'smooth' });
    }

    async function deleteSupplier(id) {
      if (!confirm('Apakah Anda yakin ingin menghapus supplier ini?')) return;

      try {
        const res = await fetch(`${API_BASE_URL}/suppliers/${id}`, {
          method: 'DELETE',
          headers
        });

        if (res.ok) {
          fetchSuppliers();
          alert('Supplier berhasil dihapus!');
        } else {
          const data = await res.json();
          alert('Gagal: ' + (data.message || 'Terjadi kesalahan'));
        }
      } catch (err) {
        alert('Kesalahan jaringan');
      }
    }

    function resetForm() {
      isEditing = false;
      formTitle.textContent = 'Tambah Supplier';
      formId.value = '';
      formNama.value = '';
      formAlamat.value = '';
      formNoHp.value = '';
      formEmail.value = '';
    }

    document.getElementById('btnSearch').addEventListener('click', fetchSuppliers);
    searchKeyword.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchSuppliers(); });
    btnSave.addEventListener('click', saveSupplier);
    btnCancel.addEventListener('click', resetForm);

    document.addEventListener('DOMContentLoaded', fetchSuppliers);
  </script>
</body>
</html>
